{% load static %}

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Página Inicial</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <header class="header">
      <ul class="header-links">
        <li>
          <a href="{% url 'home-page' %}">Home</a>
        </li>
      </ul>
    </header>

    <main>
      {% for item in news %}
      <article>
        <img src="{% static item.image.name %}" alt="{{ item.title }}" />

        <h2 class="news-title">{{ item.title }}</h2>

        <span class="news-date"> {{ item.created_at|date:"d/m/Y" }} </span>
      </article>
      {% endfor %}
    </main>
  </body>
</html>
