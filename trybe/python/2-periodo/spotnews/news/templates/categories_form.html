{% load static %}

<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Formulário para Nova Categoria</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <header class="header">
      <ul class="header-links">
        <li>
          <a href="{% url 'home-page' %}">Home</a>
        </li>

        <li>
          <a href="{% url 'categories-form' %}">Cadastrar Categorias</a>
        </li>
      </ul>
    </header>

    <form method="post" action="{% url 'categories-form' %}">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit">Salvar</button>
    </form>
  </body>
</html>
